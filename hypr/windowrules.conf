# Ignore maximize requests from apps. You'll probably like this.
windowrule = suppress_event maximize, match:class .*

# Fix some dragging issues with XWayland
windowrule = no_focus on, match:class ^$, match:title ^$, match:xwayland 1, match:float 1, match:fullscreen 0, match:pin 0

# Prevent entering idle mode while video is playing
windowrule = idle_inhibit fullscreen, match:focus 1, match:class .*

# Remove blurring on floating window
windowrule = no_blur on, match:xwayland 1, match:float 1

# Compensate missing blur on Intellij
#windowrule = opacity 1.2, class:jetbrains-idea-ce
