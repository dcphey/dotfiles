# Sources
source = ~/.config/hypr/monitors.conf

source = ~/.config/hypr/programs.conf

source = ~/.config/hypr/autostart.conf

source = ~/.config/hypr/graphics.conf

source = ~/.config/hypr/binds.conf

source = ~/.config/hypr/windowrules.conf

source = ~/.config/hypr/colors.conf

# Indicate Wayland / Hyprland preference on some apps
## Electron-based apps
env = NIXOS_OZONE_WL, 1
env = OZONE_PLATFORM,wayland
env = ELECTRON_OZONE_PLATFORM_HINT,wayland

## Toolkit backends
env = GDK_BACKEND, wayland, x11, *
env = QT_QPA_PLATFORM, wayland;xcb
env = SDL_VIDEODRIVER, wayland
env = CLUTTER_BACKEND, wayland

## XDG
env = XDG_CURRENT_DESKTOP, Hyprland
env = XDG_SESSION_DESKTOP, Hyprland
env = XDG_SESSION_TYPE, wayland
env = XDG_MENU_PREFIX, arch-

# Indicate default IME
env = GTK_IM_MODULE, fcitx
env = QT_IM_MODULE, fcitx

# Scaling
## Cursor
env = XCURSOR_SIZE, 24
env = HYPRCURSOR_SIZE, 24

## Toolkits
env = GDK_SCALE, 1
env = QT_AUTO_SCREEN_SCALE_FACTOR, 1

# Hyprland configurating sections
general {
    gaps_in = 3
    gaps_out = 0, 6, 6, 6

    border_size = 0
    resize_on_border = true

    layout = dwindle
}

decoration {
    rounding = 10
    rounding_power = 2

    layerrule = blur on, match:namespace waybar
    layerrule = ignore_alpha 0.5, match:namespace waybar

    layerrule = blur on, match:namespace quickshell
    layerrule = ignore_alpha 0.5, match:namespace quickshell

    layerrule = blur on, match:namespace rofi
    layerrule = ignore_alpha 0.5, match:namespace rofi
    layerrule = no_anim on, match:namespace rofi

    active_opacity = 1.0
    inactive_opacity = 0.9

    shadow {
        enabled = true
        range = 10
        render_power = 2
	color = rgba(00000010)
    }

    blur {
        enabled = true
        size = 10
        passes = 2
    }
}

animations {
    enabled = true
    # Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
}

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    numlock_by_default = true

    scroll_method = 2fg

    follow_mouse = 1

    sensitivity = 0.3 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = true
	scroll_factor = 0.6
	drag_3fg = 1
    }
}

gestures {
    workspace_swipe_invert = true
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0

    vrr = 2

    key_press_enables_dpms = true
}

binds {
    scroll_event_delay = 0
}

xwayland {
  force_zero_scaling = true
}

dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

ecosystem {
    no_update_news = true
    no_donation_nag = true
}
